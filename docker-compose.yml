services:
  mysql:
    image: mysql:8
    command: --mysql-native-password=ON --authentication-policy=mysql_native_password
    env_file:
      - ./sample-api/.env.docker.example
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-u", "root", "-ppassword"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: ./sample-api
    env_file:
      - ./sample-api/.env.docker.example
    ports:
      - "8081:8080"
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 30s

  front:
    build: ./sample-front
    env_file:
      - ./sample-front/.env.docker.example
    ports:
      - "3001:3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "bun",
          "-e",
          "fetch('http://localhost:3000').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 5s
      timeout: 3s
      retries: 10
