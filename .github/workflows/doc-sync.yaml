name: Sync Docs on Submodule Update

on:
  push:
    branches:
      - main
    paths:
      - sample-api
      - sample-front

jobs:
  sync-docs:
    runs-on: ubuntu-latest
    # doc-sync 自身のコミットで再トリガーされた場合はスキップ
    if: |
      !startsWith(github.event.head_commit.message, 'auto sync docs')
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Generate token
        id: generate_token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.PRIVATE_KEY }}
          owner: hrk-m

      - uses: actions/checkout@v5
        with:
          submodules: recursive
          token: ${{ steps.generate_token.outputs.token }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Sync docs with Claude
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          GITHUB_TOKEN: ${{ steps.generate_token.outputs.token }}
        run: |
          cat > /tmp/prompt.txt << 'EOF'
          以下の3つのスキルを順番に実行してください。
          AskUserQuestion は使わないでください。すべて自律的に判断して実行してください。

          ## 前提
          - update-sample-api / update-sample-front のサブモジュール更新をトリガーに起動している
          - 処理対象は「今回の更新で追加・変更されたファイル」のみ。変更のないファイルは触らない
          - 対象ファイルは `git diff HEAD~1 HEAD -- sample-api/ sample-front/` で特定する

          ## 実行手順

          1. `git diff HEAD~1 HEAD -- sample-api/ sample-front/` を実行し、今回の差分ファイルを特定する
          2. `.claude/skills/plan-writer/references/api-sync/SKILL.md` を Read して、差分ファイルに含まれるエンドポイントのみを対象に実行する
          3. `.claude/skills/plan-writer/references/schema-sync/SKILL.md` を Read して、差分にマイグレーション変更がある場合のみ実行する
          4. `.claude/skills/spec-update/references/spec-knowledge/SKILL.md` を Read して、差分ファイルに対応する画面・機能のみを対象に実行する

          ## 制約
          - コード（sample-api/ / sample-front/）の実装変更は行わない
          - docs/steering/ の変更も行わない（CI では不要）
          - スクリーンショットの撮影（spec-screenshot）は実行しない
          - `make check` / `bun run format:md:check` は実行しない（PR 作成前に自動修正ステップが走るため）
          EOF
          claude --dangerously-skip-permissions -p "$(cat /tmp/prompt.txt)"

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ steps.generate_token.outputs.token }}
          commit-message: "auto sync docs"
          title: "[doc-sync] サブモジュール更新後のドキュメント自動同期"
          branch: auto-pr/doc-sync
          branch-suffix: timestamp
          base: main
          delete-branch: true
          add-paths: |
            specs/
            plans/
