name: Sync Docs on Submodule Update

on:
  push:
    branches:
      - "auto-pr/update-sample-api*"
      - "auto-pr/update-sample-front*"
    paths:
      - sample-api
      - sample-front

jobs:
  sync-docs:
    runs-on: ubuntu-latest
    concurrency:
      group: doc-sync
      cancel-in-progress: false
    # doc-sync 自身のコミットで再トリガーされた場合はスキップ
    if: |
      !startsWith(github.event.head_commit.message, 'auto sync docs')
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Generate token
        id: generate_token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.PRIVATE_KEY }}
          owner: hrk-m

      - uses: actions/checkout@v5
        with:
          submodules: recursive
          token: ${{ steps.generate_token.outputs.token }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Setup branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          BRANCH="auto-pr/doc-sync"
          if git ls-remote --heads origin "$BRANCH" | grep -q "$BRANCH"; then
            git fetch origin "$BRANCH" main
            git checkout "$BRANCH"
            if ! git merge origin/main --no-edit; then
              git merge --abort
              git reset --hard origin/main
            fi
          else
            git checkout -b "$BRANCH"
          fi
          git submodule update --init --recursive

      - name: Sync docs with Claude
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          GITHUB_TOKEN: ${{ steps.generate_token.outputs.token }}
          BEFORE_SHA: ${{ github.event.before }}
          AFTER_SHA: ${{ github.event.after }}
        run: |
          cat > /tmp/prompt.txt << EOF
          以下の3つのスキルを順番に実行してください。
          AskUserQuestion は使わないでください。すべて自律的に判断して実行してください。

          ## 前提
          - update-sample-api / update-sample-front のサブモジュール更新をトリガーに起動している
          - 処理対象は「今回の更新で追加・変更されたファイル」のみ。変更のないファイルは触らない
          - 対象ファイルは `git diff $BEFORE_SHA $AFTER_SHA -- sample-api/ sample-front/` で特定する

          ## 実行手順

          1. `git diff $BEFORE_SHA $AFTER_SHA -- sample-api/ sample-front/` を実行し、今回の差分ファイルを特定する
          2. `.claude/skills/plan-writer/references/api-sync/SKILL.md` を Read して、差分ファイルに含まれるエンドポイントのみを対象に実行する
          3. `.claude/skills/plan-writer/references/schema-sync/SKILL.md` を Read して、差分にマイグレーション変更がある場合のみ実行する
          4. `.claude/skills/spec-update/references/spec-knowledge/SKILL.md` を Read して、差分ファイルに対応する画面・機能のみを対象に実行する

          ## 制約
          - コード（sample-api/ / sample-front/）の実装変更は行わない
          - docs/steering/ の変更も行わない（CI では不要）
          - スクリーンショットの撮影（spec-screenshot）は実行しない
          - `make check` / `bun run format:md:check` は実行しない（PR 作成前に自動修正ステップが走るため）

          ## plans/ 更新ルール
          plans/ を更新・作成する場合は、必ず以下の構造に従うこと。

          ### ドメイン名の基準（最重要）
          plans/ のドメイン名は api-sync の Step 4 ルールに従い、API パスのリソース名を単数形にしたものを使う。
            例: /api/v1/groups → group、/api/v1/users → user、/api/v1/auth → auth

          現在の対応関係（API パス → ドメイン名 → plans/ ディレクトリ）:
            /api/v1/auth/...   → auth  → plans/auth/
            /api/v1/groups/... → group → plans/group/
            /api/v1/users/...  → user  → plans/user/

          ※ このプロジェクトでは API パスのリソース名と sample-api/ のパッケージ名が一致している。
            差分ファイルのパス（sample-api/{パッケージ名}/...）からドメインを特定してもよい。

          ドメイン名を独自に命名してはいけない。
          新しいドメインが必要な場合は、API パスに新しいリソースが実際に存在することを確認してから決定する。

          ### ディレクトリ構造
          ```
          plans/{ドメイン名}/{verb-noun}/prd.md   # ドメイン名は sample-api のパッケージ名と一致させる
          plans/shared/{処理名}.md                # 複数ドメインをまたぐ共通処理
          ```
          - {verb-noun} は「動詞-名詞」形式（例: create-group, list-users, get-me）

          ### 重複防止（最優先ルール）
          新規ファイルを作成する前に、必ず既存の plans/ を確認すること。
          - `find plans/ -name "prd.md" | xargs grep -l "{キーワード}"` 等で類似ファイルを検索する
          - 同じエンドポイント・機能・処理が既存ファイルに記載されていれば、そのファイルを更新する
          - 「似ているが別物」と判断する場合は、既存ファイルとの差異を根拠として新規作成してよい
          - 重複を作るくらいなら既存ファイルに追記・更新するほうを選ぶ

          ### 判断フロー（plan-writer の書き出しルールに準拠）
          ケース A: 差分が sample-api/{ドメイン名}/ 配下のファイルの場合:
            → そのパッケージ名をドメインとして plans/{ドメイン名}/{verb-noun}/prd.md を対象にする
            → ファイルが存在すれば差分のあるセクションだけ更新する。存在しなければ新規作成する

          ケース B: 差分が複数ドメインをまたぐ共通処理（internal/ 配下等）の場合:
            → plans/shared/{処理名}.md を対象にする
            → ファイルが存在すれば差分のあるセクションだけ更新する。存在しなければ新規作成する

          ケース C: 差分が既存ドメインに属さない全く新しい機能の場合:
            → 重複防止ルールで既存ファイルに該当なしと確認してから新規作成する
            → sample-api/ 側の新しいドメインパッケージ名と同じ名前で plans/{ドメイン名}/{verb-noun}/prd.md を作成する
          EOF
          claude --dangerously-skip-permissions -p "$(cat /tmp/prompt.txt)"

      - name: Format generated Markdown
        run: bunx prettier --write "specs/**/*.md" "plans/**/*.md"

      - name: Commit and push changes
        id: commit
        run: |
          git add specs/ plans/
          if ! git diff --staged --quiet; then
            git commit -m "auto sync docs"
            git push --force-with-lease origin auto-pr/doc-sync
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "No changes to sync"
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create PR if not exists
        if: steps.commit.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ steps.generate_token.outputs.token }}
        run: |
          BRANCH="auto-pr/doc-sync"
          if ! gh pr view "$BRANCH" --json state -q '.state' 2>/dev/null | grep -q "OPEN"; then
            gh pr create \
              --title "[doc-sync] サブモジュール更新後のドキュメント自動同期" \
              --body "サブモジュール更新後の自動ドキュメント同期" \
              --base main \
              --head "$BRANCH"
          fi
