name: Sync Docs on Submodule Update

on:
  push:
    branches-ignore:
      - main
    paths:
      - sample-api
      - sample-front

jobs:
  sync-docs:
    runs-on: ubuntu-latest
    concurrency:
      group: doc-sync
      cancel-in-progress: false
    # doc-sync 自身のコミットで再トリガーされた場合はスキップ
    if: |
      !startsWith(github.event.head_commit.message, 'auto sync docs')
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Generate token
        id: generate_token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.PRIVATE_KEY }}
          owner: hrk-m

      - uses: actions/checkout@v5
        with:
          submodules: recursive
          token: ${{ steps.generate_token.outputs.token }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Setup branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          BRANCH="auto-pr/doc-sync"
          if git ls-remote --heads origin "$BRANCH" | grep -q "$BRANCH"; then
            git fetch origin "$BRANCH"
            git checkout "$BRANCH"
            if ! git merge origin/main --no-edit; then
              git merge --abort
              git reset --hard origin/main
            fi
          else
            git checkout -b "$BRANCH"
          fi
          git submodule update --init --recursive

      - name: Sync docs with Claude
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          GITHUB_TOKEN: ${{ steps.generate_token.outputs.token }}
          BEFORE_SHA: ${{ github.event.before }}
          AFTER_SHA: ${{ github.event.after }}
        run: |
          cat > /tmp/prompt.txt << EOF
          以下の3つのスキルを順番に実行してください。
          AskUserQuestion は使わないでください。すべて自律的に判断して実行してください。

          ## 前提
          - update-sample-api / update-sample-front のサブモジュール更新をトリガーに起動している
          - 処理対象は「今回の更新で追加・変更されたファイル」のみ。変更のないファイルは触らない
          - 対象ファイルは `git diff $BEFORE_SHA $AFTER_SHA -- sample-api/ sample-front/` で特定する

          ## 実行手順

          1. `git diff $BEFORE_SHA $AFTER_SHA -- sample-api/ sample-front/` を実行し、今回の差分ファイルを特定する
          2. `.claude/skills/plan-writer/references/api-sync/SKILL.md` を Read して、差分ファイルに含まれるエンドポイントのみを対象に実行する
          3. `.claude/skills/plan-writer/references/schema-sync/SKILL.md` を Read して、差分にマイグレーション変更がある場合のみ実行する
          4. `.claude/skills/spec-update/references/spec-knowledge/SKILL.md` を Read して、差分ファイルに対応する画面・機能のみを対象に実行する

          ## 制約
          - コード（sample-api/ / sample-front/）の実装変更は行わない
          - docs/steering/ の変更も行わない（CI では不要）
          - スクリーンショットの撮影（spec-screenshot）は実行しない
          - `make check` / `bun run format:md:check` は実行しない（PR 作成前に自動修正ステップが走るため）
          EOF
          claude --dangerously-skip-permissions -p "$(cat /tmp/prompt.txt)"

      - name: Format generated Markdown
        run: bunx prettier --write "specs/**/*.md" "plans/**/*.md"

      - name: Commit and push changes
        id: commit
        run: |
          git add specs/ plans/
          if ! git diff --staged --quiet; then
            git commit -m "auto sync docs"
            git push --force-with-lease origin auto-pr/doc-sync
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "No changes to sync"
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create PR if not exists
        if: steps.commit.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ steps.generate_token.outputs.token }}
        run: |
          BRANCH="auto-pr/doc-sync"
          if ! gh pr view "$BRANCH" --json state -q '.state' 2>/dev/null | grep -q "OPEN"; then
            gh pr create \
              --title "[doc-sync] サブモジュール更新後のドキュメント自動同期" \
              --body "サブモジュール更新後の自動ドキュメント同期" \
              --base main \
              --head "$BRANCH"
          fi
