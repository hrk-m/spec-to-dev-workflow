name: Sync Docs after E2E

on:
  workflow_run:
    workflows: ["E2E Tests"]
    types: [completed]
    branches: [main]

jobs:
  sync-docs:
    runs-on: ubuntu-latest
    # E2E が成功し、かつ doc-sync 自身の PR マージで再トリガーされた場合はスキップ
    if: |
      github.event.workflow_run.conclusion == 'success' &&
      !startsWith(github.event.workflow_run.head_commit.message, 'auto sync docs')
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Generate token
        id: generate_token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.PRIVATE_KEY }}
          owner: hrk-m

      - uses: actions/checkout@v5
        with:
          submodules: recursive
          token: ${{ steps.generate_token.outputs.token }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Sync docs with Claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ steps.generate_token.outputs.token }}
          claude_args: "--max-turns 30"
          prompt: |
            以下の3つのスキルを順番に実行してください。
            AskUserQuestion は使わないでください。すべて自律的に判断して実行してください。

            1. `.claude/skills/plan-writer/references/api-sync/SKILL.md` を Read して実行する
            2. `.claude/skills/plan-writer/references/schema-sync/SKILL.md` を Read して実行する
            3. `.claude/skills/spec-update/references/spec-knowledge/SKILL.md` を Read して実行する

            ## 制約
            - コード（sample-api/ / sample-front/）の実装変更は行わない
            - docs/steering/ の変更も行わない（CI では不要）
            - スクリーンショットの撮影（spec-screenshot）は実行しない
            - 変更がない場合はそのまま終了する

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ steps.generate_token.outputs.token }}
          commit-message: "auto sync docs after E2E pass"
          title: "[doc-sync] E2E pass 後のドキュメント自動同期"
          branch: auto-pr/doc-sync
          branch-suffix: timestamp
          base: main
          delete-branch: true
          add-paths: |
            specs/
            plans/
